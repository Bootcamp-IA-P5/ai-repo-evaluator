services:
  db:
    image: postgres:15-alpine
    container_name: evaluator_db
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eval-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: evaluator_backend
    volumes:
      - ${PROJECT_ROOT:-.}/backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8000:8000"
    networks:
      - eval-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: evaluator_frontend  
    volumes:
      - ${PROJECT_ROOT:-.}/frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    networks:
      - eval-network

networks:
  eval-network:
    driver: bridge

volumes:
  postgres_data:
  