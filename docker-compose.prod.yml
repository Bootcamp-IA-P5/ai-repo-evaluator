services:
  db:
    image: postgres:15-alpine
    container_name: evaluator_db_prod
    restart: always
    env_file:
      - ./backend/.env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - nginx_proxy_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: evaluator_backend_prod
    restart: always
    env_file:
      - ./backend/.env.prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nginx_proxy_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: evaluator_frontend_prod
    restart: always
    env_file:
      - ./frontend/.env.prod
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nginx_proxy_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  nginx_proxy_network:
    external: true

volumes:
  postgres_data_prod:
